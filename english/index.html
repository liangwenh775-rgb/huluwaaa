<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英语刷题系统</title>
  <style>
:root {
  --bg: #f6f7f4;
  --panel: #ffffff;
  --ink: #17211d;
  --muted: #657069;
  --line: #dfe4dc;
  --accent: #006f63;
  --accent-2: #c43d2f;
  --gold: #efb700;
  --ok: #148642;
  --bad: #ba2b2b;
  --warn: #a66500;
  --shadow: 0 16px 38px rgba(20, 32, 28, 0.11);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: Arial, "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background: var(--bg);
}
button, input, select, textarea { font: inherit; }
button {
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  border-radius: 8px;
  padding: 9px 12px;
  cursor: pointer;
}
button:hover { border-color: var(--accent); }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.danger { background: var(--accent-2); color: #fff; border-color: var(--accent-2); }
button.icon { width: 38px; height: 38px; padding: 0; display: inline-grid; place-items: center; }
.app { min-height: 100vh; display: grid; grid-template-columns: 320px 1fr; }
.sidebar {
  border-right: 1px solid var(--line);
  background: #fbfcfa;
  padding: 22px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
}
.brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.brand h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
.egg {
  margin: 16px 0;
  padding: 10px 12px;
  border-radius: 8px;
  color: #fff;
  background: #ff006e;
  font-weight: 800;
  text-align: center;
  border: 2px solid #ffbe0b;
}
.meta { color: var(--muted); font-size: 13px; line-height: 1.55; }
.control { margin-top: 18px; }
.control label { display: block; margin-bottom: 7px; color: var(--muted); font-size: 13px; }
select, input[type="text"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  padding: 10px 11px;
}
.segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.segmented button { padding: 8px 6px; }
.segmented button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
.stat { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fff; }
.stat strong { display: block; font-size: 18px; }
.stat span { color: var(--muted); font-size: 12px; }
.main { padding: 26px; min-width: 0; }
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}
.toolbar-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.progress {
  height: 10px;
  background: #e9eee7;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 18px;
}
.progress > div { height: 100%; width: 0; background: var(--accent); transition: width 180ms ease; }
.accuracy-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 12px;
  align-items: center;
  margin: 0 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.accuracy-card strong {
  color: var(--ink);
  font-size: 20px;
}
.accuracy-bar {
  grid-column: 1 / -1;
  height: 12px;
  background: #e9eee7;
  border-radius: 999px;
  overflow: hidden;
}
.accuracy-bar > div {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--bad), var(--gold), var(--ok));
  transition: width 180ms ease;
}
.workspace { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 18px; align-items: start; }
.question-panel, .side-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.question-panel { padding: 22px; min-height: 520px; }
.side-panel { padding: 16px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 9px;
  color: var(--muted);
  font-size: 12px;
}
.pill.warn { color: #fff; background: var(--warn); border-color: var(--warn); }
.stem { font-size: 22px; line-height: 1.55; margin: 16px 0 20px; }
.reading-context {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 0 0 16px;
}
.context-box {
  max-height: 240px;
  overflow: auto;
  border: 1px solid var(--line);
  background: #fbfcfa;
  border-radius: 8px;
  padding: 12px;
  line-height: 1.65;
  white-space: pre-wrap;
  font-size: 14px;
}
.options { display: grid; gap: 10px; margin: 16px 0; }
.option {
  text-align: left;
  min-height: 44px;
  line-height: 1.35;
}
.option.selected { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.option.correct { background: #e8f6ed; border-color: var(--ok); }
.option.wrong { background: #fae7e7; border-color: var(--bad); }
.answer-input { max-width: 680px; }
.actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
.feedback {
  margin-top: 18px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #fbfcfa;
  min-height: 48px;
}
.feedback.ok { border-color: var(--ok); background: #e8f6ed; }
.feedback.bad { border-color: var(--bad); background: #fae7e7; }
.analysis {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(0, 0, 0, 0.08);
}
.analysis ul {
  margin: 6px 0 0;
  padding-left: 20px;
}
.analysis li { margin: 4px 0; }
.mini-title { margin: 0 0 10px; font-size: 14px; color: var(--muted); }
.list { display: grid; gap: 8px; max-height: 390px; overflow: auto; }
.jump {
  display: grid;
  grid-template-columns: 48px 1fr 28px;
  align-items: center;
  gap: 8px;
  width: 100%;
  text-align: left;
  padding: 8px;
}
.jump.active { border-color: var(--accent); background: #edf7f5; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #ccd5cf; }
.dot.ok { background: var(--ok); }
.dot.bad { background: var(--bad); }
.muted { color: var(--muted); }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .workspace { grid-template-columns: 1fr; }
  .reading-context { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .main, .sidebar { padding: 16px; }
  .toolbar { align-items: stretch; flex-direction: column; }
  .stem { font-size: 18px; }
  .question-panel { padding: 16px; min-height: auto; }
}
.toolbar-actions #prevBtn,
.toolbar-actions #nextBtn,
.toolbar-actions #checkBtn,
.toolbar-actions #revealBtn { display: none; }
.workspace { grid-template-columns: minmax(0, 1fr) 260px; }
.question-panel {
  background: transparent;
  border: 0;
  box-shadow: none;
  padding: 0;
  min-height: 0;
}
.question-list { display: grid; gap: 16px; }
.question-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 20px;
  scroll-margin-top: 18px;
}
.question-card.answered-ok { border-color: rgba(20, 134, 66, 0.55); }
.question-card.answered-bad { border-color: rgba(186, 43, 43, 0.55); }
.question-card .stem { font-size: 19px; }
.question-card .feedback { display: none; }
.question-card .feedback.visible { display: block; }
.question-card .actions { margin-top: 12px; }
.question-card .reading-context { grid-template-columns: 1fr; }
.question-card .context-box { max-height: 210px; }
.reading-context-wrap {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfa;
  margin-bottom: 14px;
}
.reading-context-wrap summary {
  cursor: pointer;
  padding: 10px 12px;
  color: var(--accent);
  font-weight: 700;
}
.reading-context-wrap .reading-context {
  padding: 0 12px 12px;
  margin: 0;
}
.question-index {
  display: inline-grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #edf2ee;
  font-weight: 700;
  color: var(--accent);
}
.flow-note { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
@media (max-width: 980px) {
  .workspace { grid-template-columns: 1fr; }
  .side-panel { position: static; }
}
@media (max-width: 560px) {
  .question-card { padding: 14px; }
  .question-card .stem { font-size: 17px; }
}
</style>
</head>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>英语刷题系统</h1>
        <button id="shuffleBtn" class="icon" type="button" title="随机排序">↻</button>
      </div>
      <div class="egg">刘将大帅比</div>

      <div class="control">
        <label>题型</label>
        <div class="segmented">
          <button class="active" data-type="all" type="button">全部</button>
          <button data-type="vocabulary" type="button">词汇</button>
          <button data-type="listening" type="button">听力</button>
        </div>
        <div class="segmented" style="margin-top:6px; grid-template-columns: 1fr;">
          <button data-type="reading" type="button">阅读</button>
        </div>
      </div>

      <div class="control">
        <label for="statusFilter">校验状态</label>
        <select id="statusFilter">
          <option value="all">全部状态</option>
          <option value="verified">仅已校验</option>
          <option value="unverified">需人工核对</option>
        </select>
      </div>

      <div class="control">
        <label for="sectionFilter">章节 / Passage</label>
        <select id="sectionFilter"></select>
      </div>

      <div class="stats">
        <div class="stat"><strong id="totalCount">0</strong><span>总题数</span></div>
        <div class="stat"><strong id="sourceCount">0</strong><span>源文件</span></div>
        <div class="stat"><strong id="verifiedCount">0</strong><span>已校验</span></div>
        <div class="stat"><strong id="unverifiedCount">0</strong><span>需核对</span></div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div>
          <strong><span id="currentCount">0</span> / <span id="filteredCount">0</span></strong>
          <span class="muted">已答 / 当前题数，竖向滑动练习</span>
        </div>
        <div class="toolbar-actions">
          <button id="shuffleBtnInline" type="button">随机排序</button>
          <button id="resetBtn" class="danger" type="button">清空记录</button>
        </div>
      </div>
      <div class="progress"><div id="bar"></div></div>
      <div class="accuracy-card">
        <span>正确率</span>
        <strong id="accuracyRate">0%</strong>
        <span id="accuracyDetail">还没有答题记录</span>
        <span>错题 <strong id="wrongCount">0</strong></span>
        <div class="accuracy-bar"><div id="accuracyBar"></div></div>
      </div>
      <div class="workspace">
        <section id="questionPanel" class="question-panel"></section>
        <aside class="side-panel">
          <p class="mini-title">答题记录：<strong id="doneCount">0</strong> 已答，<strong id="rightCount">0</strong> 正确，<strong id="wrongCountSide">0</strong> 错题</p>
          <div id="jumpList" class="list"></div>
        </aside>
      </div>
    </main>
  </div>

    "answer": "A",
    "answerTranslation": "它对我们的健康有相当大的影响。",
    "contextRaw": "All living organisms on Earth are exposed to a 24-hour day-night cycle. This cycle is the reason why people rest at night and are active during the day. Consequently, all human body functions also follow this daily rhythm, and the timing of behaviors like exercise or food intake can significantly influence your health. For example, eating at night can lead to weight gain over time because food intake at night leads to increased fat storage.\n\nMany drug targets in the body follow a 24-hour cycle, too. This means that the specific proteins a drug is designed to modify can react differently to the medicine over the course of a 24-hour time period. Because how the body responds to a drug can differ depending on the time it is taken, it logically follows that taking medicines at specific times could help increase their effectiveness and reduce unwanted side effects.\n\nWhen doctors prescribe medicine for people, they rarely consider the best time to take it. There are two main reasons for that oversight. First, many physicians are not aware that some drugs work better during a specific time of the day. And second, most drugs have not been studied for possible different effects during a 24-hour cycle. Therefore, patients are directed to take most drugs during the morning or evening primarily to ensure compliance.\n\nOver 50 years ago, researchers found that the cholesterol drug simvastatin is more effective at lowering cholesterol levels when taken at night rather than during the day. This is because the liver enzyme these drugs target is more active at night.\n\nTaking medicine at the wrong time can even cause harm. My colleagues and I wondered whether midazolam, the most common sedative used in surgical procedures worldwide, might interfere with the internal clock that protects the heart at night. Currently, there are no guidelines regarding when midazolam should be administered.\n\nMore research is needed to determine the best times to administer treatments for different diseases. I believe taking drug timing into account could help make treatments more effective and help more people worldwide.",
    "contextTranslation": "地球上所有生物都处在24小时昼夜交替的周期中。正是这一周期决定了人们夜间休息、白天活动的规律。因此，人体各项功能也遵循这种日常节律，运动、进食等行为发生的时间会明显影响健康。例如，夜间进食可能随着时间推移导致体重增加，因为夜间进食更容易使脂肪储存增加。\n\n人体内许多药物靶点也遵循24小时周期。这意味着药物要调节的特定蛋白质，在一天中的不同时间可能会对药物产生不同反应。既然身体对药物的反应会因服药时间不同而变化，那么在特定时间服药就可能提高药效并减少不良副作用。\n\n医生给病人开药时，很少考虑最佳服药时间。造成这种忽视主要有两个原因：第一，许多医生并不知道某些药物在一天中的特定时间效果更好；第二，大多数药物还没有被研究过在24小时周期内是否会产生不同效果。因此，医生通常让患者早晨或晚上服用大多数药物，主要是为了确保患者能遵医嘱服药。\n\n50多年前，研究人员发现降胆固醇药辛伐他汀在夜间服用比白天服用更能有效降低胆固醇水平。这是因为该药物所作用的肝脏酶在夜间更活跃。\n\n在错误时间服药甚至可能造成伤害。我和同事曾想知道，全球外科手术中最常用的镇静剂咪达唑仑，是否会干扰夜间保护心脏的生物钟。目前，关于咪达唑仑应在何时给药还没有相关指南。\n\n我们还需要开展更多研究，以确定不同疾病治疗的最佳给药时间。我认为，把服药时间纳入考虑可以提高治疗效果，并帮助世界上更多患者受益。",

    "contextRaw": "Katharine Abraham, an economics professor, was chatting with her hairdresser about retirement plans. The economist said she plans to continue working because she wants to. The hairdresser agreed but for a different reason: She needs the money.\n\nBoth scenarios are contributing to a big increase in the number of people in the US working into their 70s. Over the past 20 years, the share of Americans working in their 70s has risen from less than 10% to nearly 15%.\n\nIn addition to people being healthier and living much longer, economists say that a combination of financial considerations such as years of slow rise in real wages and a shift away from traditional pensions in the private sector are some of the reasons people delay retirement. The decline of manufacturing and the increase in the number of people working in less labor-intensive occupations also has contributed to the trend, says Abraham, who researches work and retirement decisions of older Americans.\n\n\"Which matters more depends on what your history up until that point has been in the type of work you're doing,\" Abraham says.\n\nThe overall trend is hitting Americans of all different levels of educational attainment, although the percentages vary by category. The share of Americans with bachelor's degrees who were working into their 70s reached nearly 20% in 2018. For those with a high school degree or less, the proportion of those working in their 70s had risen to around 10%, while those with some college education were in the middle at around 15%.\n\nMartin Neil Baily, an economist who is leading a research project on retirement security, notes that quitting a career can lead to feelings of isolation and loneliness, particularly for men. He suggests that many college-educated workers are choosing to stay in the labor force more for social benefits than for financial reasons. They're also more likely to be in professional occupations where they tend to enjoy their work more.\n\nWo     "contextRaw": "Junk food is now a staple of many Americans' diets. Advertising campaigns from the snack food companies, often featuring sports stars, send the message that we can neutralize any negative effects of consuming their products simply by getting more physical exercise. But recent studies show a lack of exercise is not to blame for rising obesity rates. Bad diets are.\n\nInterventions to help reduce junk food consumption are especially important for children and teenagers. Prevention is better than cure because obesity is so difficult to treat. Unfortunately, while health education has shown some success among young children, teens have been harder to reach.\n\nNow a large-scale study has tried an innovative approach to change teenagers' attitudes towards healthy eating, and the results are promising. The researchers argued that previous interventions have probably been unsuccessful because of a major flaw: they focused on a future, healthier you and assumed that this would be enough motivation for teenagers. In contrast, the new intervention cleverly exploits teenagers' instinct for rebelliousness and autonomy, and the value they place on social justice.\n\nTo do this, researchers had students read an article on the food industry. It revealed a secret about the manipulative and deceptive strategies used to make junk food more addictive and characterize the products as healthy. The article also explained how advertising campaigns specifically target very young and poor people, causing harm for these vulnerable groups. Afterwards, the participants read a fictional survey of teens who wanted to \"fight back against the companies by buying and eating less processed food\".\n\nAfter the intervention, participants associated healthy eating with autonomy and social justice. The teenagers also rated healthy eating as being more appealing. Importantly, there were also some promising effects of the new intervention on actual behavior. A day later the students were offered a choice of snacks and drinks in a seemingly unrelated context. The teens chose healthy snacks and drinks, such as fruit or water, more often over unhealthy options, like biscuits and soda. Apparently associating a healthy diet with teenagers' own values seems to be a promising avenue to prevent obesity.",

ere offered a choice of snacks and drinks in a seemingly unrelated context. The teens chose healthy snacks and drinks, such as fruit or water, more often over unhealthy options, like biscuits and soda. Apparently associating a healthy diet with teenagers' own values seems to be a promising avenue to prevent obesity.",
    "contextTranslation": "垃圾食品如今已成为许多美国人饮食中的常见组成部分。零食公司的广告宣传常常请体育明星代言，传递出这样一种信息：只要多进行体育锻炼，就能抵消食用其产品带来的任何负面影响。但最新研究表明，肥胖率上升并不是因为缺乏运动，而是因为不良饮食。\n\n帮助减少垃圾食品摄入的干预措施对儿童和青少年尤其重要。肥胖很难治疗，因此预防胜于治疗。遗憾的是，健康教育虽然在低龄儿童中取得了一定成效，但对青少年的影响较弱。\n\n如今，一项大规模研究尝试用创新方法改变青少年对健康饮食的态度，结果令人期待。研究人员认为，以往干预措施之所以大多失败，是因为存在一个重大缺陷：它们关注的是未来更健康的自己，并假定这一点足以成为青少年的动力。相比之下，新的干预措施巧妙地利用了青少年叛逆、追求自主的天性，以及他们对社会公平的重视。\n\n为此，研究人员让学生阅读一篇关于食品行业的文章。文章揭露了食品行业为使垃圾食品更容易让人上瘾、并把产品包装成健康食品而采用的操纵性和欺骗性策略。文章还解释了广告宣传如何专门针对年幼和贫困人群，从而伤害这些弱势群体。随后，参与者阅读了一份虚构的青少年调查，调查中青少年表示希望“通过少购买、少食用加工食品来反击这些公司”。\n\n干预后，参与者把健康饮食与自主意识和社会公平联系起来。青少年也认为健康饮食更有吸引力。更重要的是，这种新干预措施对实际行为也产生了一些积极影响。一天后，学生们在一个看似无关的场景中被提供零食和饮料选择。与饼干、汽水等不健康选项相比，青少年更常选择水果、水等健康零食和饮品。显然，把健康饮食与青少年自身价值观联系起来，似乎是预防肥胖的一条有希望的途径。",

    "contextRaw": "Adults dream during REM sleep and infants have loads of REM. So, it might be fair to assume that babies have tons of dreams.\n\nBut scientists believe REM serves a completely different purpose for newborns and infants than dreaming. When babies are in REM, it allows their brain to develop pathways, connections, and eventually, learn languages.\n\nSince your baby doesn't dream at this stage of brain development, it's safe to assume babies do not have nightmares, either. Nightmares stem from exposure to trauma, an overactive imagination, and the normal stresses of everyday life.\n\nAre you wondering, what do babies dream about? Good question, but the answer is nothing!\n\nSo, when do babies start dreaming? The general consensus is that they start dreaming around the age of two. Psychologist David Foulkes studies children, from very small kids to teens, to bring the secrets of their dreams to the light of day. In his lab, he lets kids fall asleep and then wakes them 3 times a night and asks them to describe what they recall.\n\nFoulkes' findings are unsurprising. Basically, little kids have little dreams. But exactly what kids see while dreaming depends on their age. As children develop and grow, their dreams do too.\n\nDreams of very small kids are usually just snapshots, looking much more like a slideshow than a movie, when compared to the dreams of adults. They heavily feature animals and other familiar sights, like images of people eating. According to Foulkes, \"Children's dream life seems to be similar to their waking imagination and narration.\" Kids ages 5 to 9 begin seeing moving images and characters in action. Dreams now include multiple events strung together, one after the other. They also start developing greater ability to remember dreams. Still, that's not always the case: When roused during REM sleep, 25% of the kids in Foulkes' studies had no recollection of dreaming, a trend that continues through age 9.\n\nSo, if your baby seems to be in a stressful state while sleeping or is upset upon waking, there may be other factors at play.",
    "contextTranslation": "成年人会在快速眼动睡眠期间做梦，而婴儿有大量快速眼动睡眠。因此，人们也许会合理地推测，婴儿会做很多梦。\n\n但科学家认为，对新生儿和婴儿而言，快速眼动睡眠发挥的作用与做梦完全不同。婴儿处于快速眼动睡眠状态时，大脑会借此形成神经通路和连接，并最终学习语言。\n\n既然婴儿在这一大脑发育阶段并不会做梦，那么也可以认为婴儿不会做噩梦。噩梦源于创伤经历、过度活跃的想象力以及日常生活中的正常压力。\n\n你是否好奇婴儿会梦见什么？这是个好问题，但答案是：什么也没有。\n\n那么，婴儿什么时候开始做梦呢？普遍共识是，他们大约在两岁左右开始做梦。心理学家大卫·福克斯研究从幼儿到青少年的儿童，以揭示他们梦境中的秘密。在实验室里，他让孩子们入睡，然后每晚叫醒他们三次，让他们描述自己记得的内容。\n\n福克斯的发现并不令人意外。基本上，年幼孩子的梦也很简单。但孩子在梦中究竟看见什么取决于他们的年龄。随着儿童成长发育，他们的梦境也会随之发展。\n\n与成年人相比，非常年幼孩子的梦通常只是一些“快照”式片段，更像幻灯片而不是电影。梦中常出现动物和其他熟悉场景，例如人们吃饭的画面。福克斯认为，儿童的梦境生活似乎与他们清醒时的想象和叙述相似。5到9岁的孩子开始在梦中看到运动画面和行动中的人物。梦境开始包含多个连续发生的事件。他们记住梦境的能力也开始增强。不过情况并非总是如此：在福克斯的研究中，当孩子在快速眼动睡眠期间被叫醒时，有25%的孩子完全不记得自己做过梦，这种趋势会持续到9岁。\n\n因此，如果你的宝宝睡觉时看起来很紧张，或醒来后情绪烦躁，可能是其他因素在起作用。",

    "contextTranslation": "成年人会在快速眼动睡眠期间做梦，而婴儿有大量快速眼动睡眠。因此，人们也许会合理地推测，婴儿会做很多梦。\n\n但科学家认为，对新生儿和婴儿而言，快速眼动睡眠发挥的作用与做梦完全不同。婴儿处于快速眼动睡眠状态时，大脑会借此形成神经通路和连接，并最终学习语言。\n\n既然婴儿在这一大脑发育阶段并不会做梦，那么也可以认为婴儿不会做噩梦。噩梦源于创伤经历、过度活跃的想象力以及日常生活中的正常压力。\n\n你是否好奇婴儿会梦见什么？这是个好问题，但答案是：什么也没有。\n\n那么，婴儿什么时候开始做梦呢？普遍共识是，他们大约在两岁左右开始做梦。心理学家大卫·福克斯研究从幼儿到青少年的儿童，以揭示他们梦境中的秘密。在实验室里，他让孩子们入睡，然后每晚叫醒他们三次，让他们描述自己记得的内容。\n\n福克斯的发现并不令人意外。基本上，年幼孩子的梦也很简单。但孩子在梦中究竟看见什么取决于他们的年龄。随着儿童成长发育，他们的梦境也会随之发展。\n\n与成年人相比，非常年幼孩子的梦通常只是一些“快照”式片段，更像幻灯片而不是电影。梦中常出现动物和其他熟悉场景，例如人们吃饭的画面。福克斯认为，儿童的梦境生活似乎与他们清醒时的想象和叙述相似。5到9岁的孩子开始在梦中看到运动画面和行动中的人物。梦境开始包含多个连续发生的事件。他们记住梦境的能力也开始增强。不过情况并非总是如此：在福克斯的研究中，当孩子在快速眼动睡眠期间被叫醒时，有25%的孩子完全不记得自己做过梦，这种趋势会持续到9岁。\n\n因此，如果你的宝宝睡觉时看起来很紧张，或醒来后情绪烦躁，可能是其他因素在起作用。",

    "contextRaw": "New York's Eleven Madison Park has become the first vegan restaurant to be awarded three Michelin stars.\n\nThe fine dining establishment received its first three-star Michelin rating in 2011 when the menu was famed for its fancy animal-based dishes.\n\nHowever, last year, the restaurant's co-owner and famous chef, Daniel Humm, made the bold decision to remove meat from the menu, citing our unsustainable food system. While cow milk is still served for tea and coffee, the menu is almost 100 percent vegan.\n\nAt the time, Humm acknowledged the move was risky, admitting that \"it wasn't clear if guests would come\" but called the gamble \"a risk worth taking.\"\n\n\"In view of the climate crisis, I didn't want to open the same restaurant,\" Humm told the Financial Times in an interview. \"If we can show the possibilities of eating plant-based food in this setting, it can open a lot of doors\" for others to follow.\n\nNow, this impressive new accomplishment validates Eleven Madison Park's decision to take meat off the menu and embrace plant-based foods, with Michelin's 2022 New York guide branding it a \"bold vision of luxury dining.\"\n\n\"We took the jump to transform Eleven Madison Park into a plant-based fine dining restaurant knowing in our hearts this is what we believed in,\" stated Humm on Instagram. \"Last night, we were honored to be awarded three Michelin stars for the 11th year in a row. I am so grateful to the team members who contributed through its nearly 25-year history. We are also grateful to our guests and partners who believed in our vision and encouraged us to push harder.\"\n\nThree Michelin stars is the highest award, given to chefs who are at the peak of their profession. \"Their cooking is elevated to an art form and some of their dishes are destined to become classics,\" reads Michelin's website, in a clear nod to plant-based food's growing significance in the culinary world.\n\n\"I think luxury companies have a real role to     "contextTranslation": "纽约麦迪逊公园11号餐厅成为首家获得米其林三星评级的素食餐厅。\n\n这家高级餐厅在2011年首次获得米其林三星评级，当时其菜单以精致的动物源菜品而闻名。\n\n然而，去年，该餐厅联合创始人、著名厨师丹尼尔·胡姆做出了大胆决定：将肉类从菜单中移除，理由是当前食物体系不可持续。虽然茶和咖啡仍提供牛奶，但菜单几乎百分之百为素食。\n\n当时，胡姆承认这一举措有风险，并坦言“不确定客人是否还会光顾”，但他称这次冒险“值得一试”。\n\n胡姆在接受《金融时报》采访时说：“鉴于气候危机，我不想重新开一家和过去一样的餐厅。如果我们能在这样的场景中展示植物基饮食的可能性，就能为其他人打开许多扇门。”\n\n如今，这一令人瞩目的新成就证明麦迪逊公园11号餐厅取消肉类菜品、拥抱植物基食物的决定是正确的。米其林2022年纽约指南将其称为“豪华餐饮的大胆愿景”。\n\n胡姆在社交媒体上表示：“我们毅然决定把麦迪逊公园11号转型为植物基高级餐厅，因为我们内心相信这就是我们认同的理念。昨晚，我们很荣幸连续第11年获得米其林三星。我非常感谢近25年来为餐厅发展做出贡献的团队成员，也感谢相信我们愿景、鼓励我们继续前进的客人和合作伙伴。”\n\n米其林三星是最高奖项，授予那些处于行业巅峰的厨师。米其林网站写道：“他们的烹饪被提升为一种艺术形式，其中一些菜品注定会成为经典。”这显然是在认可植物基食物在烹饪界日益增长的重要性。\n\n胡姆说：“我认为奢华品牌确实可以发挥作用，也负有责任。我们越有创造力，我们的未来就会越美好、越美味。”",

    "answerTranslation": "了解它们的准确性。",
    "contextRaw": "With genetic testing becoming increasingly popular, many people are left wondering exactly how accurate it is. Whether you are taking a DNA test to build your extended DNA family tree, or want precise information on inborn health conditions, it is important to understand how accurate genetic tests are, and what information we can rely upon.\n\nHow accurate DNA tests are relies greatly upon the kind of test being taken, on the specific question you ask, and on how complex the genetics behind a trait is. For example, tests for traits that depend on a single gene provide much more reliable results, because you can see whether a disease-causing trait is present.\n\nAncestry tests claim to reveal our genetic identities. But saying you are 30 percent East Asian or American hardly reflects your real ancestry.\n\nWhat about using DNA tests to discover distant family members? There are tools to compare one's DNA with others to find distant relatives based on their genetic identification. These kinds of applications are generally accurate. It's relatively easy to tell whether two DNA samples belong to close relatives. With distant relatives, results become hazier.\n\nGenetic health tests claim to be able to detect certain hereditary diseases, or other health conditions. While certain rare diseases can be easily identified, most potential health conditions cannot be identified by genetic testing alone. The large majority of our traits and diseases also depend upon non-genetic factors, such as lifestyle, the environment, and many others.\n\nGenetic tests for multi-factorial traits are often very tricky to interpret. Height, for example, depends on hundreds of genes, each contributing a little to the outcome, together with a bunch of environmental factors. A test can look at many genes at once, but it's difficult to predict how they will play together. Then you should also account for non-genetic factors that are not written in the DNA.\n\nTests that offer to     "contextTranslation": "随着基因检测越来越普及，许多人不禁想知道它到底有多准确。无论你是想通过DNA检测建立扩展家谱，还是想获得有关先天健康状况的准确信息，了解基因检测的准确性以及哪些信息值得信赖都非常重要。\n\nDNA检测的准确性很大程度上取决于检测类型、你提出的具体问题，以及某一特征背后的遗传机制有多复杂。例如，针对由单个基因决定的特征进行检测，结果会可靠得多，因为可以直接判断是否存在致病特征。\n\n血统检测声称可以揭示我们的遗传身份。但说你有30%的东亚或美洲血统，几乎无法反映你真实的祖先来源。\n\n那么，用DNA检测寻找远房亲属又如何呢？有些工具可以把一个人的DNA与他人的DNA进行比较，根据遗传标识寻找远亲。这类应用通常较为准确。判断两份DNA样本是否来自近亲相对容易；但对于远亲，结果就会变得更模糊。\n\n基因健康检测声称能够发现某些遗传性疾病或其他健康状况。虽然某些罕见疾病可以较容易地识别出来，但大多数潜在健康状况无法仅靠基因检测确定。我们绝大多数特征和疾病还取决于非遗传因素，例如生活方式、环境以及许多其他因素。\n\n针对多因素特征的基因检测往往很难解读。以身高为例，它取决于数百个基因，每个基因都对结果产生一点影响，同时还受到一系列环境因素影响。检测可以同时分析许多基因，但很难预测它们将如何共同发挥作用。此外，还应考虑那些没有写入DNA的非遗传因素。\n\n那些声称可以通过DNA为你找到完美恋爱对象，或预测性格、天赋的检测，纯属无稽之谈。目前，这类应用的科学基础要么不存在，要么极其薄弱。",

const STORAGE_KEY = "embedded_quiz_state_v2";
let currentType = "all";
let currentStatus = "all";
let currentSection = "all";
let filtered = [];
let history = loadHistory();

function $(id) { return document.getElementById(id); }

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch { return {}; }
}

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function normalizeAnswer(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/\s*,\s*/g, ",")
    .replace(/\s+/g, " ");
}

function acceptedAnswers(answer) {
  const variants = [];
  String(answer || "").split("/").forEach(part => {
    const normalized = normalizeAnswer(part);
    if (!normalized) return;
    variants.push(normalized);
    variants.push(normalized.replace(/,/g, " "));
  });
  return [...new Set(variants.map(normalizeAnswer).filter(Boolean))];
}

function itemAnswerText(item) {
  if (item.type === "vocabulary") return item.answer;
  const option = (item.options || []).find(opt => opt.startsWith(item.answer + ")"));
  return option || item.answer;
}

function optionBody(option) {
  return String(option || "").replace(/^[A-D]\)\s*/, "").trim();
}

function optionWords(option) {
  const stopWords = new Set([
    "a", "an", "the", "and", "or", "but", "to", "of", "in", "on", "for", "with", "by", "as", "at", "from",
    "is", "are", "was", "were", "be", "being", "been", "it", "its", "they", "their", "them", "he", "she", "his",
    "her", "we", "our", "you", "your", "that", "this", "these", "those", "what", "which", "who", "how", "why",
    "do", "does", "did", "can", "could", "would", "should", "will", "may", "might", "not", "no", "more", "most"
  ]);
  const text = optionBody(option).toLowerCase();
  return (text.match(/[a-z][a-z'-]{2,}/g) || [])
    .map(word => word.replace(/^'+|'+$/g, ""))
    .filter(word => word.length > 2 && !stopWords.has(word));
}

function hasPattern(text, pattern) {
  return pattern.test(String(text || "").toLowerCase());
}

function buildMemoryAnalysis(item) {
  if (!item || item.type === "vocabulary" || !Array.isArray(item.options) || item.options.length !== 4) return "";
  const correctOption = (item.options || []).find(opt => opt.startsWith(item.answer + ")"));
  if (!correctOption) return "";

  const correctText = optionBody(correctOption);
  const wrongOptions = item.options.filter(opt => opt !== correctOption);
  const wrongText = wrongOptions.map(optionBody).join(" ").toLowerCase();
  const wrongWords = new Set(wrongOptions.flatMap(optionWords));
  const uniqueWords = [...new Set(optionWords(correctOption))]
    .filter(word => !wrongWords.has(word))
    .slice(0, 4);
  const notes = [];

  if (uniqueWords.length) {
    notes.push(`正确项独有关键词：${uniqueWords.join(", ")}。复盘时优先回到原文里找这些词或它们的同义表达。`);
  }

  const contrastPatterns = [
    { label: "数字或比例", pattern: /\b\d+[%\w-]*\b|percent|percentage|million|billion|decade|year|years/ },
    { label: "因果", pattern: /\bbecause|since|as a result|lead(?:s|ing)? to|result(?:s|ed)? from|therefore|thus|due to\b/ },
    { label: "转折", pattern: /\bhowever|but|although|though|despite|whereas|while|instead\b/ },
    { label: "比较或最高级", pattern: /\bmore|less|most|least|better|worse|higher|lower|rather than|compared with\b/ },
    { label: "态度或判断", pattern: /\bimportant|necessary|possible|likely|unlikely|difficult|beneficial|harmful|risk|worth\b/ },
    { label: "时间线", pattern: /\bbefore|after|during|currently|previously|eventually|first|last|recently|now|then\b/ },
  ];
  const correctSignals = contrastPatterns
    .filter(({ pattern }) => hasPattern(correctText, pattern) && !hasPattern(wrongText, pattern))
    .map(({ label }) => label);
  if (correctSignals.length) {
    notes.push(`正确项的明显特征：${correctSignals.join("、")}。这类题通常要核对原文中的同类信号。`);
  }

  const negationCount = wrongOptions.filter(opt => hasPattern(opt, /\bno|not|never|none|without|fail(?:s|ed)? to|unable\b/)).length;
  const correctHasNegation = hasPattern(correctText, /\bno|not|never|none|without|fail(?:s|ed)? to|unable\b/);
  if (correctHasNegation && negationCount === 0) {
    notes.push("正确项带否定表达，容易和正向表述混淆；记忆时把否定词一起记。");
  } else if (!correctHasNegation && negationCount >= 2) {
    notes.push("多个干扰项带否定或绝对化表达，正确项更偏正向或中性。");
  }

  const absoluteCount = wrongOptions.filter(opt => hasPattern(opt, /\balways|never|all|none|only|completely|entirely|must\b/)).length;
  const correctHasAbsolute = hasPattern(correctText, /\balways|never|all|none|only|completely|entirely|must\b/);
  if (!correctHasAbsolute && absoluteCount >= 2) {
    notes.push("干扰项里有较强的绝对词，回忆时注意原文是否真的支持这么绝对的说法。");
  }

  if (item.stemTranslation) {
    notes.push(`题干中文定位：${item.stemTranslation}`);
  }

  if (!notes.length) {
    notes.push("记忆方法：先背正确项的核心意思，再回看其它三个选项分别错在范围、对象、因果或程度是否被改动。");
  }

  return `<div class="analysis"><strong>分析辅助记忆</strong><ul>${notes.map(note => `<li>${escapeHtml(note)}</li>`).join("")}</ul></div>`;
}

function itemById(id) {
  return QUIZ_DB.find(item => item.id === id);
}

function init() {
  $("totalCount").textContent = QUIZ_DB.length;
  $("verifiedCount").textContent = QUIZ_DB.filter(i => i.status === "verified").length;
  $("unverifiedCount").textContent = QUIZ_DB.filter(i => i.status === "unverified").length;
  $("sourceCount").textContent = new Set(QUIZ_DB.map(i => i.sourceFile)).size;
  buildSections();
  bindEvents();
  applyFilters();
}

function buildSections() {
  const select = $("sectionFilter");
  const sections = [...new Set(QUIZ_DB.map(i => i.section))].sort((a, b) => a.localeCompare(b));
  select.innerHTML = '<option value="all">All sections / Passage</option>' +
    sections.map(s => `<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`).join("");
}

function bindEvents() {
  document.querySelectorAll("[data-type]").forEach(btn => {
    btn.addEventListener("click", () => {
      currentType = btn.dataset.type;
      document.querySelectorAll("[data-type]").forEach(b => b.classList.toggle("active", b === btn));
      applyFilters();
    });
  });
  $("statusFilter").addEventListener("change", e => { currentStatus = e.target.value; applyFilters(); });
  $("sectionFilter").addEventListener("change", e => { currentSection = e.target.value; applyFilters(); });
  $("shuffleBtn").addEventListener("click", shuffleCurrent);
  $("shuffleBtnInline").addEventListener("click", shuffleCurrent);
  $("resetBtn").addEventListener("click", resetProgress);
  $("questionPanel").addEventListener("click", handleQuestionClick);
  $("questionPanel").addEventListener("keydown", handleQuestionKeydown);
}

function applyFilters() {
  filtered = QUIZ_DB.filter(item => {
    return (currentType === "all" || item.type === currentType) &&
      (currentStatus === "all" || item.status === currentStatus) &&
      (currentSection === "all" || item.section === currentSection);
  });
  render();
}

function render() {
  $("filteredCount").textContent = filtered.length;
  updateStats();
  if (!filtered.length) {
    $("questionPanel").innerHTML = '<div class="empty">No questions match the current filters.</div>';
    $("jumpList").innerHTML = "";
    return;
  }
  $("questionPanel").innerHTML = `
    <p class="flow-note">Vertical practice mode: scroll freely. Multiple-choice answers are checked immediately after click.</p>
    <div class="question-list">${filtered.map((item, idx) => renderQuestionCard(item, idx)).join("")}</div>
  `;
  restoreAnsweredState();
  renderJumpList();
}

function renderQuestionCard(item, idx) {
  const typeName = { vocabulary: "Vocabulary", listening: "Listening", reading: "Reading" }[item.type];
  const statusText = item.status === "verified" ? "Verified" : "Needs review";
  const statusClass = item.status === "verified" ? "" : " warn";
  const context = item.type === "reading" ? `
    <details class="reading-context-wrap">
      <summary>Passage text / translation</summary>
      <div class="reading-context">
        <div class="context-box">${escapeHtml(item.contextRaw || "")}</div>
        <div class="context-box">${escapeHtml(item.contextTranslation || "")}</div>
      </div>
    </details>` : "";
  const stemTranslation = item.stemTranslation ? `<p class="muted">${escapeHtml(item.stemTranslation)}</p>` : "";
  const answerUi = item.type === "vocabulary"
    ? `<input class="answer-input" data-input="${escapeAttr(item.id)}" type="text" placeholder="Type answer and press Enter" autocomplete="off">`
    : `<div class="options">${(item.options || []).map((opt, optIdx) =>
        `<button class="option" data-id="${escapeAttr(item.id)}" data-choice="${escapeAttr(opt.charAt(0))}" type="button">${optIdx + 1}. ${escapeHtml(opt)}</button>`).join("")}</div>`;
  return `
    <article id="card-${escapeAttr(item.id)}" class="question-card" data-id="${escapeAttr(item.id)}">
      <div class="pill-row">
        <span class="question-index">${idx + 1}</span>
        <span class="pill">${typeName}</span>
        <span class="pill">${escapeHtml(item.section)}</span>
        <span class="pill">No. ${item.questionNo}</span>
        <span class="pill${statusClass}">${statusText}</span>
      </div>
      ${context}
      <div class="stem">${escapeHtml(item.stem)}</div>
      ${stemTranslation}
      ${answerUi}
      <div class="actions">
        ${item.type === "vocabulary" ? `<button data-action="check-vocab" data-id="${escapeAttr(item.id)}" class="primary" type="button">Check</button>` : ""}
        <button data-action="reveal" data-id="${escapeAttr(item.id)}" type="button">Show answer</button>
      </div>
      <div class="feedback" data-feedback="${escapeAttr(item.id)}">Source: ${escapeHtml(item.sourceFile)}</div>
    </article>
  `;
}

function handleQuestionClick(event) {
  const option = event.target.closest(".option");
  if (option) {
    checkChoice(option.dataset.id, option.dataset.choice);
    return;
  }
  const action = event.target.closest("[data-action]");
  if (!action) return;
  if (action.dataset.action === "check-vocab") checkVocabulary(action.dataset.id);
  if (action.dataset.action === "reveal") revealAnswer(action.dataset.id);
}

function handleQuestionKeydown(event) {
  if (event.key !== "Enter") return;
  const input = event.target.closest("[data-input]");
  if (input) checkVocabulary(input.dataset.input);
}

function checkChoice(id, choice) {
  const item = itemById(id);
  const card = cardFor(id);
  if (!item || !card) return;
  const correct = normalizeAnswer(choice) === normalizeAnswer(item.answer);
  card.querySelectorAll(".option").forEach(btn => {
    btn.classList.toggle("selected", btn.dataset.choice === choice);
    btn.classList.toggle("correct", btn.dataset.choice === item.answer);
    btn.classList.toggle("wrong", btn.dataset.choice === choice && !correct);
  });
  recordAnswer(item, correct);
  showFeedback(id, correct ? "ok" : "bad", correct ? "Correct" : "Wrong", item);
}

function checkVocabulary(id) {
  const item = itemById(id);
  const card = cardFor(id);
  if (!item || !card) return;
  const input = card.querySelector(`[data-input="${cssEscape(id)}"]`);
  const correct = acceptedAnswers(item.answer).includes(normalizeAnswer(input ? input.value : ""));
  recordAnswer(item, correct);
  showFeedback(id, correct ? "ok" : "bad", correct ? "Correct" : "Wrong", item);
}

function revealAnswer(id) {
  const item = itemById(id);
  const card = cardFor(id);
  if (!item || !card) return;
  if (item.type === "vocabulary") {
    const input = card.querySelector(`[data-input="${cssEscape(id)}"]`);
    const typed = normalizeAnswer(input ? input.value : "");
    if (!typed && !history[item.id]) {
      recordAnswer(item, false);
      showFeedback(id, "bad", "Wrong", item);
      return;
    }
  }
  if (item.type !== "vocabulary") {
    card.querySelectorAll(".option").forEach(btn => {
      btn.classList.toggle("correct", btn.dataset.choice === item.answer);
      btn.classList.remove("wrong");
    });
  }
  showFeedback(id, "", "Answer", item);
}

function recordAnswer(item, correct) {
  history[item.id] = { correct, at: Date.now() };
  saveHistory();
  const card = cardFor(item.id);
  if (card) {
    card.classList.toggle("answered-ok", correct);
    card.classList.toggle("answered-bad", !correct);
  }
  updateStats();
  renderJumpList();
}

function showFeedback(id, kind, title, item) {
  const box = document.querySelector(`[data-feedback="${cssEscape(id)}"]`);
  if (!box) return;
  const extraLabel = item.type === "listening" ? "正确答案中文" : "答案翻译";
  const extra = item.answerTranslation ? `<div class="muted">${extraLabel}: ${escapeHtml(item.answerTranslation)}</div>` : "";
  const analysis = buildMemoryAnalysis(item);
  box.className = `feedback visible ${kind}`;
  box.innerHTML = `<strong>${escapeHtml(title)}</strong><div>Correct answer: ${escapeHtml(itemAnswerText(item))}</div>${extra}${analysis}`;
}

function restoreAnsweredState() {
  filtered.forEach(item => {
    const h = history[item.id];
    if (!h) return;
    const card = cardFor(item.id);
    if (!card) return;
    card.classList.toggle("answered-ok", h.correct);
    card.classList.toggle("answered-bad", !h.correct);
    showFeedback(item.id, h.correct ? "ok" : "bad", h.correct ? "Correct" : "Wrong", item);
    if (item.type !== "vocabulary") {
      card.querySelectorAll(".option").forEach(btn => {
        btn.classList.toggle("correct", btn.dataset.choice === item.answer);
      });
    }
  });
}

function renderJumpList() {
  const list = $("jumpList");
  list.innerHTML = filtered.map((item, idx) => {
    const h = history[item.id];
    const dotClass = h ? (h.correct ? "ok" : "bad") : "";
    return `<button class="jump" data-jump="${escapeAttr(item.id)}" type="button">
      <span>${idx + 1}</span><span>No.${item.questionNo} ${escapeHtml(item.section)}</span><span class="dot ${dotClass}"></span>
    </button>`;
  }).join("");
  list.querySelectorAll("[data-jump]").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = cardFor(btn.dataset.jump);
      if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });
  updateStats();
}

function updateStats() {
  const total = filtered.length;
  const done = filtered.filter(item => history[item.id]).length;
  const right = filtered.filter(item => history[item.id]?.correct).length;
  const wrong = Math.max(0, done - right);
  const progress = total ? Math.round((done / total) * 100) : 0;
  const accuracy = done ? Math.round((right / done) * 100) : 0;
  $("currentCount").textContent = done;
  $("doneCount").textContent = done;
  $("rightCount").textContent = right;
  $("wrongCount").textContent = wrong;
  $("wrongCountSide").textContent = wrong;
  $("accuracyRate").textContent = `${accuracy}%`;
  $("accuracyDetail").textContent = done ? `${right} 正确 / ${done} 已答` : "还没有答题记录";
  $("bar").style.width = `${progress}%`;
  $("accuracyBar").style.width = `${accuracy}%`;
}

function shuffleCurrent() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  render();
}

function resetProgress() {
  if (!confirm("Clear local practice records?")) return;
  history = {};
  saveHistory();
  render();
}

function cardFor(id) {
  return document.getElementById(`card-${id}`);
}

function cssEscape(value) {
  if (window.CSS && CSS.escape) return CSS.escape(value);
  return String(value).replace(/["\\]/g, "\\$&");
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#96;");
}

document.addEventListener("DOMContentLoaded", init);

  </script>
</body>
</html>
