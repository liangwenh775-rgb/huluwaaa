<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>马原刷题</title>
  <style>
    :root {
      --bg: #f4f7f3;
      --panel: #ffffff;
      --ink: #223026;
      --muted: #647068;
      --line: #dfe7de;
      --accent: #2d6a4f;
      --accent-soft: #e3f0e7;
      --ok: #dff3e4;
      --ok-border: #67b57a;
      --bad: #fde2e2;
      --bad-border: #dc6b6b;
      --warn: #fff6db;
      --shadow: 0 10px 28px rgba(38, 56, 43, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 243, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 18px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0 8px;
    }
    h1 { margin: 0; font-size: 20px; font-weight: 750; }
    .mode {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 132px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .switch button, .tabs button, .actions button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }
    .switch button {
      min-height: 32px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
    }
    .switch button.active { color: #fff; background: var(--accent); }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding-bottom: 10px;
    }
    .tabs button {
      min-height: 42px;
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      font-weight: 650;
    }
    .tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    main { padding: 18px 0 34px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat span { display: block; color: var(--muted); font-size: 13px; }
    .stat strong { font-size: 18px; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 16px;
      align-items: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .question { padding: 22px; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 7px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 650;
    }
    .stem {
      margin: 0 0 18px;
      font-size: 19px;
      font-weight: 650;
      line-height: 1.7;
    }
    .options { display: grid; gap: 10px; }
    .option {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      width: 100%;
      text-align: left;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      color: var(--ink);
      cursor: pointer;
      font-size: 16px;
    }
    .option .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #edf3ed;
      font-weight: 750;
      color: var(--accent);
    }
    .option.selected { border-color: var(--accent); background: #eef7f1; }
    .option.correct { border-color: var(--ok-border); background: var(--ok); }
    .option.wrong { border-color: var(--bad-border); background: var(--bad); }
    .answer {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      background: #f1f3f1;
      color: var(--muted);
    }
    .answer.show { display: block; }
    .answer b { color: var(--ink); }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .actions button {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .actions button.secondary { background: #e9eee9; color: var(--ink); }
    .actions button.danger { background: #b44444; color: #fff; }
    .actions button:disabled { opacity: .45; cursor: not-allowed; }
    aside { padding: 14px; }
    .side-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 750;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      max-height: 58vh;
      overflow: auto;
      padding-right: 2px;
    }
    .grid button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfb;
      color: var(--ink);
      cursor: pointer;
    }
    .grid button.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .grid button.done { background: var(--accent-soft); }
    .grid button.bad { background: var(--bad); border-color: var(--bad-border); }
    .empty {
      padding: 34px 22px;
      text-align: center;
      color: var(--muted);
    }
    .notice {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--warn);
      border: 1px solid #ead48c;
      color: #69511d;
      font-size: 14px;
    }
    @media (max-width: 820px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .tabs { gap: 6px; }
      .tabs button { font-size: 14px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .layout { grid-template-columns: 1fr; }
      aside { order: -1; }
      .grid { grid-template-columns: repeat(8, 1fr); max-height: 170px; }
      .question { padding: 18px; }
      .stem { font-size: 17px; }
    }
    @media (max-width: 460px) {
      .wrap { padding: 0 12px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tabs button { min-height: 40px; padding: 0 4px; font-size: 13px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: repeat(6, 1fr); }
      .option { grid-template-columns: 32px minmax(0, 1fr); padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <h1>马原刷题</h1>
        <div class="mode">
          <span>刷题模式</span>
          <div class="switch">
            <button id="modeSeq" type="button">顺序</button>
            <button id="modeRand" type="button">随机</button>
          </div>
        </div>
      </div>
      <nav class="tabs" aria-label="题型切换">
        <button data-tab="single" type="button">单选题</button>
        <button data-tab="multi" type="button">多选题</button>
        <button data-tab="judge" type="button">判断题</button>
        <button data-tab="wrong" type="button">错题本</button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="notice" class="notice" hidden></div>
    <section class="stats" aria-label="进度">
      <div class="stat"><span>当前题型</span><strong id="statType">单选题</strong></div>
      <div class="stat"><span>进度</span><strong id="statDone">0/0</strong></div>
      <div class="stat"><span>正确率</span><strong id="statRate">0%</strong></div>
      <div class="stat"><span>错题数</span><strong id="statWrong">0</strong></div>
    </section>

    <section class="layout">
      <article id="questionCard" class="card question"></article>
      <aside class="card">
        <div class="side-title">
          <span>题目序号</span>
          <span id="sideCount"></span>
        </div>
        <div id="indexGrid" class="grid"></div>
      </aside>
    </section>
  </main>

    const PARSE_WARNINGS = [];
    const TYPE_NAMES = { single: "单选题", multi: "多选题", judge: "判断题", wrong: "错题本" };
    const STORAGE_KEY = "mayuan-quiz-state-v1";
    const DEFAULT_STATE = {
      activeTab: "single",
      mode: "seq",
      cursor: { single: 0, multi: 0, judge: 0, wrong: 0 },
      progress: {},
      wrongIds: []
    };
    let state = loadState();
    let currentOrder = {};
    let selected = new Set();
    let judged = false;

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Object.assign(structuredClone(DEFAULT_STATE), stored || {});
      } catch {
        return structuredClone(DEFAULT_STATE);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function allQuestions() {
      return [...BANK.single, ...BANK.multi, ...BANK.judge];
    }

    function questionMap() {
      const map = new Map();
      allQuestions().forEach(q => map.set(q.id, q));
      return map;
    }

    function getQuestions(tab = state.activeTab) {
      if (tab === "wrong") {
        const map = questionMap();
        return state.wrongIds.map(id => map.get(id)).filter(Boolean);
      }
      return BANK[tab] || [];
    }

    function shuffleIds(items) {
      const ids = items.map((_, i) => i);
      for (let i = ids.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ids[i], ids[j]] = [ids[j], ids[i]];
      }
      return ids;
    }

    function getOrder(tab) {
      const qs = getQuestions(tab);
      const key = `${tab}:${state.mode}:${qs.map(q => q.id).join("|")}`;
      if (!currentOrder[key]) {
        currentOrder = { [key]: state.mode === "rand" ? shuffleIds(qs) : qs.map((_, i) => i) };
      }
      return currentOrder[key];
    }

    function currentQuestion() {
      const qs = getQuestions();
      if (!qs.length) return null;
      const order = getOrder(state.activeTab);
      const pos = Math.min(state.cursor[state.activeTab] || 0, qs.length - 1);
      return qs[order[pos]];
    }

    function currentIndexInList() {
      const qs = getQuestions();
      const q = currentQuestion();
      return q ? qs.findIndex(item => item.id === q.id) : -1;
    }

    function progressOf(q) {
      return state.progress[q.id] || null;
    }

    function markProgress(q, correct, selectedAnswer) {
      state.progress[q.id] = {
        correct,
        selected: Array.isArray(selectedAnswer) ? selectedAnswer : [selectedAnswer],
        at: Date.now()
      };
      const exists = state.wrongIds.includes(q.id);
      if (!correct && !exists) state.wrongIds.push(q.id);
      if (correct && exists && state.activeTab !== "wrong") {
        state.wrongIds = state.wrongIds.filter(id => id !== q.id);
      }
      saveState();
    }

    function answerText(q) {
      if (q.type === "judge") return q.answer;
      return q.answer.split("").join("、");
    }

    function selectedAnswerText(q, sel) {
      if (q.type === "judge") return [...sel][0] || "";
      return [...sel].sort().join("");
    }

    function isCorrect(q, sel) {
      if (q.type === "judge") return [...sel][0] === q.answer;
      return [...sel].sort().join("") === q.answer.split("").sort().join("");
    }

    function optionClass(q, option) {
      const classes = ["option"];
      const isSel = selected.has(option.key);
      if (isSel) classes.push("selected");
      if (judged) {
        const correctKeys = q.type === "judge" ? [q.answer] : q.answer.split("");
        const shouldBe = correctKeys.includes(option.key);
        if (shouldBe) classes.push("correct");
        if (q.type === "multi") {
          if ((isSel && !shouldBe) || (!isSel && shouldBe)) classes.push("wrong");
        } else if (isSel && !shouldBe) {
          classes.push("wrong");
        }
      }
      return classes.join(" ");
    }

    function choose(optionKey) {
      const q = currentQuestion();
      if (!q || judged) return;
      if (q.type === "multi") {
        selected.has(optionKey) ? selected.delete(optionKey) : selected.add(optionKey);
        renderQuestion();
        return;
      }
      selected = new Set([optionKey]);
      judge();
    }

    function judge() {
      const q = currentQuestion();
      if (!q || judged || selected.size === 0) return;
      judged = true;
      markProgress(q, isCorrect(q, selected), selectedAnswerText(q, selected));
      render();
    }

    function nextQuestion() {
      const qs = getQuestions();
      if (!qs.length) return;
      const next = (state.cursor[state.activeTab] + 1) % qs.length;
      state.cursor[state.activeTab] = next;
      selected = new Set();
      judged = false;
      saveState();
      render();
    }

    function jumpToListIndex(listIndex) {
      const qs = getQuestions();
      const order = getOrder(state.activeTab);
      const orderPos = order.indexOf(listIndex);
      if (orderPos >= 0) {
        state.cursor[state.activeTab] = orderPos;
        selected = new Set();
        judged = false;
        saveState();
        render();
      }
    }

    function removeWrong(id) {
      state.wrongIds = state.wrongIds.filter(item => item !== id);
      if (state.activeTab === "wrong") state.cursor.wrong = Math.max(0, Math.min(state.cursor.wrong, getQuestions("wrong").length - 1));
      saveState();
      render();
    }

    function clearWrong() {
      state.wrongIds = [];
      state.cursor.wrong = 0;
      saveState();
      render();
    }

    function setTab(tab) {
      state.activeTab = tab;
      state.cursor[tab] = state.cursor[tab] || 0;
      selected = new Set();
      judged = false;
      saveState();
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      currentOrder = {};
      selected = new Set();
      judged = false;
      saveState();
      render();
    }

    function renderStats() {
      const qs = getQuestions();
      const done = qs.filter(q => state.progress[q.id]).length;
      const correct = qs.filter(q => state.progress[q.id]?.correct).length;
      const rate = done ? Math.round((correct / done) * 100) : 0;
      document.getElementById("statType").textContent = TYPE_NAMES[state.activeTab];
      document.getElementById("statDone").textContent = `${done}/${qs.length}`;
      document.getElementById("statRate").textContent = `${rate}%`;
      document.getElementById("statWrong").textContent = state.wrongIds.length;
    }

    function renderTabs() {
      document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === state.activeTab);
      });
      document.getElementById("modeSeq").classList.toggle("active", state.mode === "seq");
      document.getElementById("modeRand").classList.toggle("active", state.mode === "rand");
    }

    function renderNotice() {
      const notice = document.getElementById("notice");
      if (!PARSE_WARNINGS.length) {
        notice.hidden = true;
        return;
      }
      notice.hidden = false;
      notice.textContent = `已生成题库，但有 ${PARSE_WARNINGS.length} 条源数据提示：${PARSE_WARNINGS.slice(0, 3).join("；")}${PARSE_WARNINGS.length > 3 ? "……" : ""}`;
    }

    function renderQuestion() {
      const card = document.getElementById("questionCard");
      const qs = getQuestions();
      const q = currentQuestion();
      if (!q) {
        const wrongActions = state.activeTab === "wrong" ? `<div class="actions"><button class="secondary" type="button" onclick="clearWrong()">清空错题</button></div>` : "";
        card.innerHTML = `<div class="empty">${state.activeTab === "wrong" ? "错题本是空的，做错的题会自动收录到这里。" : "当前分类没有题目。"}</div>${wrongActions}`;
        return;
      }
      const orderPos = state.cursor[state.activeTab] || 0;
      const listIndex = currentIndexInList();
      const submitButton = q.type === "multi" ? `<button type="button" onclick="judge()" ${selected.size ? "" : "disabled"}>提交答案</button>` : "";
      const wrongButton = state.activeTab === "wrong" ? `<button class="danger" type="button" onclick="removeWrong('${q.id}')">移除本题</button><button class="secondary" type="button" onclick="clearWrong()">清空错题</button>` : "";
      card.innerHTML = `
        <div class="meta">
          <span class="badge">${TYPE_NAMES[q.type]}</span>
          <span>${orderPos + 1} / ${qs.length}</span>
          <span>${escapeHtml(q.source)}</span>
        </div>
        <p class="stem">${escapeHtml(q.stem)}</p>
        <div class="options">
          ${q.options.map(opt => `
            <button type="button" class="${optionClass(q, opt)}" onclick="choose('${opt.key}')">
              <span class="key">${escapeHtml(opt.key)}</span>
              <span>${escapeHtml(opt.text)}</span>
            </button>
          `).join("")}
        </div>
        <div class="answer ${judged ? "show" : ""}">
          <div><b>标准答案：</b>${escapeHtml(answerText(q))}</div>
          <div><b>解析：</b>${escapeHtml(q.analysis)}</div>
        </div>
        <div class="actions">
          ${submitButton}
          <button type="button" onclick="nextQuestion()">${judged ? "下一题" : "跳过 / 下一题"}</button>
          ${wrongButton}
        </div>
      `;
    }

    function renderIndex() {
      const qs = getQuestions();
      const q = currentQuestion();
      const grid = document.getElementById("indexGrid");
      document.getElementById("sideCount").textContent = `${qs.length}题`;
      grid.innerHTML = qs.map((item, idx) => {
        const p = progressOf(item);
        const cls = [
          q && q.id === item.id ? "active" : "",
          p ? "done" : "",
          p && !p.correct ? "bad" : ""
        ].filter(Boolean).join(" ");
        return `<button type="button" class="${cls}" onclick="jumpToListIndex(${idx})">${idx + 1}</button>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function render() {
      renderTabs();
      renderNotice();
      renderStats();
      renderQuestion();
      renderIndex();
    }

    document.querySelectorAll(".tabs button").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
    document.getElementById("modeSeq").addEventListener("click", () => setMode("seq"));
    document.getElementById("modeRand").addEventListener("click", () => setMode("rand"));
    render();
  </script>
